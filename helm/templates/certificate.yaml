apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: "{{ .Values.config.prefix }}-cert"
  namespace: "{{ .Values.config.namespace }}"
spec:
  secretName: "{{ .Values.config.prefix }}-tls"
  issuerRef:
    name: certmanager-issuer
    kind: ClusterIssuer
  dnsNames:
    - "{{ .Values.config.hostname }}"
