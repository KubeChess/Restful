apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: "{{ .Values.config.prefix }}-ig"
  namespace: "{{ .Values.config.namespace }}"
spec:
  entryPoints:
    - websecure
  tls:
    secretName: "{{ .Values.config.prefix }}-tls"
  routes:
    - match: Host("{{ .Values.config.hostname }}") && PathPrefix("{{ .Values.config.routePrefix }}")
      kind: Rule
      middlewares:
        - name: "{{ .Values.config.prefix }}-https-redirect"
        - name: "{{ .Values.config.prefix }}-authenticator"
      services:
        - name: "{{ .Values.config.prefix }}-sv"
          port: 80